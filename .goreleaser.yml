version: 2

project_name: gostack

before:
  hooks:
    - go mod tidy

builds:
  - id: gostack
    main: ./cmd/gostack
    binary: gostack
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/alifkhasan01/gostack-cli/internal/cli.Version={{.Version}}
      - -X github.com/alifkhasan01/gostack-cli/internal/cli.Commit={{.Commit}}
      - -X github.com/alifkhasan01/gostack-cli/internal/cli.BuildDate={{.Date}}

archives:
  - id: gostack
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: alifkhasan01
    name: gostack-cli
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto
  footer: |
    ## Installation

    **Go install:**
    ```bash
    go install github.com/alifkhasan01/gostack-cli@latest
    ```

    **Homebrew:**
    ```bash
    brew tap alifkhasan01/gostack
    brew install gostack
    ```

    Or download the binary for your platform from the assets below.

